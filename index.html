<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICU Timetable 2026 Spring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { touch-action: manipulation; }
        /* 時間割グリッドの基本設定 */
        .time-grid {
            display: grid;
            grid-template-columns: 45px repeat(6, minmax(90px, 1fr));
            grid-template-rows: repeat(145, minmax(8px, 1fr)); /* スマホ用に高さを圧縮 */
            background-color: #ffffff;
            position: relative;
        }

        @media (min-width: 769px) {
            .time-grid {
                grid-template-columns: 80px repeat(6, minmax(150px, 1fr));
                grid-template-rows: repeat(145, minmax(12px, 1fr));
            }
        }

        /* 授業ブロック */
        .course-block {
            margin: 1px; border-radius: 4px; line-height: 1.1; position: relative;
            z-index: 10; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer; overflow: hidden; transition: all 0.2s ease;
        }
        .is-super {
            border: 2px double #2563eb !important;
            background-image: repeating-linear-gradient(-45deg, rgba(37, 99, 235, 0.05) 0, rgba(37, 99, 235, 0.05) 5px, transparent 5px, transparent 10px);
        }

        .time-tag-top, .time-tag-bottom {
            font-family: ui-monospace, monospace; font-size: 7px; background: rgba(30, 58, 138, 0.85);
            color: white; padding: 0 3px; border-radius: 2px; position: absolute; left: 1px; font-weight: bold;
        }
        .time-tag-top { top: 1px; } .time-tag-bottom { bottom: 1px; }

        /* スマホ用時限バッジ */
        .mobile-period-tag {
            font-size: 7px; font-weight: 900; background: white; border: 1px solid #3b82f6;
            color: #3b82f6; padding: 0 2px; border-radius: 2px; margin-top: 1px; width: fit-content;
        }

        .period-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #3b82f6;
            color: #1e40af; font-weight: 900; font-size: 9px;
        }

        /* サイドバー背景（スマホでのタップ閉じ用） */
        #overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 35; backdrop-filter: blur(2px);
        }
        #overlay.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col text-gray-900 overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <header class="bg-white shadow-md px-4 py-2 flex justify-between items-center z-50 border-b-2 border-blue-600">
        <h1 class="text-sm md:text-xl font-black text-blue-900 tracking-tighter leading-none">ICU <span class="text-blue-600">2026 Spring</span></h1>
        <div class="flex items-center gap-2">
            <button onclick="downloadImage()" class="text-[9px] md:text-xs bg-green-600 text-white px-3 py-1.5 rounded-full font-black shadow uppercase tracking-widest">Image</button>
            <button onclick="toggleSidebar()" class="md:hidden text-[9px] bg-blue-600 text-white px-3 py-1.5 rounded-full font-black shadow uppercase">Menu</button>
        </div>
    </header>

    <main class="flex-1 relative flex overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white z-40 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col md:relative md:translate-x-0 md:shadow-none border-r">
            <div class="p-4 border-b bg-blue-50/40">
                <h2 class="text-[10px] font-black uppercase mb-3 text-blue-800 tracking-widest">✨ Free Add</h2>
                <input type="text" id="custom-name" placeholder="予定名" class="w-full border rounded-lg px-3 py-1.5 text-xs mb-2 outline-none">
                <div class="flex gap-2 mb-2">
                    <select id="custom-day" class="flex-1 border rounded-lg px-2 py-1 text-xs font-bold">
                        <option value="1">月曜</option><option value="2">火曜</option><option value="3">水曜</option>
                        <option value="4">木曜</option><option value="5">金曜</option><option value="6">土曜</option>
                    </select>
                    <label class="flex items-center text-[9px] font-black bg-white px-2 border rounded-lg">
                        <input type="checkbox" id="custom-is-super" class="mr-1" onchange="togglePeriodButtons('custom')"> S
                    </label>
                </div>
                <div id="custom-period-container" class="grid grid-cols-4 gap-1 mb-3"></div>
                <input type="hidden" id="custom-start"><input type="hidden" id="custom-end">
                <button onclick="addCustomCourse()" class="w-full bg-blue-600 text-white text-[10px] py-2.5 rounded-lg font-black shadow active:scale-95">ADD</button>
            </div>
            <div class="p-3 bg-gray-50 border-b">
                <input type="text" id="search-input" oninput="renderSyllabusList(this.value)" placeholder="🔍 Search..." class="w-full border rounded-xl px-4 py-1.5 text-xs outline-none focus:border-blue-400">
            </div>
            <div id="syllabus-list" class="flex-1 overflow-y-auto p-3 space-y-2 bg-white"></div>
        </aside>

        <div class="flex-1 overflow-auto p-1 md:p-4 bg-slate-100" id="capture-area">
            <div class="inline-block bg-white rounded-xl shadow-xl border overflow-hidden" id="timetable-card">
                <div class="grid grid-cols-[45px_repeat(6,90px)] md:grid-cols-[80px_repeat(6,1fr)] bg-blue-900 text-white text-center text-[8px] md:text-[10px] font-black uppercase py-2 tracking-widest">
                    <div>Time</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="timetable-grid" class="time-grid"></div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xs p-5 shadow-2xl">
            <input type="text" id="edit-title" class="w-full border-b-2 font-black text-lg mb-4 outline-none">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="text" id="edit-instructor" placeholder="教員名" class="bg-gray-50 border rounded-lg p-2 text-xs">
                <input type="text" id="edit-location" placeholder="場所 📍" class="bg-gray-50 border rounded-lg p-2 text-xs">
            </div>
            <div id="edit-period-container" class="grid grid-cols-4 gap-1 p-2 bg-gray-50 rounded-lg border mb-4"></div>
            <button onclick="saveEdit()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-sm shadow-lg">UPDATE</button>
            <button onclick="closeModal('edit-modal')" class="w-full text-gray-400 text-xs mt-4">Cancel</button>
            <input type="hidden" id="edit-id"><input type="hidden" id="edit-start"><input type="hidden" id="edit-end">
        </div>
    </div>

    <script>
        const PERIOD_DATA = {"1":["08:45","10:00"],"2":["10:10","11:25"],"3":["11:35","12:50"],"L":["12:50","14:00"],"4":["14:00","15:15"],"5":["15:25","16:40"],"6":["16:50","18:05"],"7":["18:15","19:30"]};
        const SUPER_DATA = {"S4":["13:20","15:15"],"S5":["15:25","17:20"],"S7":["18:15","20:10"]};
        
        let masterSyllabus = [
            // 前回までの全データをここに結合
            { id: 'ANT102', title: '現代人類学の諸問題', instructor: 'KATO, Etsuko', lang: 'J', location: '本館115', isSuper: false, periods: [{day:1, start:'11:35', end:'12:50'}] }
        ];

        let activeData = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('active');
        }

        function timeToRow(t) {
            const [h, m] = t.split(':').map(Number);
            return Math.floor(((h * 60 + m) - (8 * 60 + 30)) / 5) + 1;
        }

        function getShortPeriodLabel(start, end, isSuper) {
            const data = isSuper ? SUPER_DATA : PERIOD_DATA;
            const startKey = Object.keys(data).find(k => data[k][0] === start);
            const endKey = Object.keys(data).find(k => data[k][1] === end);
            return (startKey && endKey && startKey !== endKey) ? `${startKey}-${endKey}` : (startKey || "S");
        }

        function renderBlock(d) {
            const grid = document.getElementById('timetable-grid');
            const s = timeToRow(d.start), e = timeToRow(d.end);
            const block = document.createElement('div');
            block.className = `course-block ${d.isSuper ? 'is-super' : 'bg-blue-50 border-blue-500 text-blue-900'}`;
            block.id = d.id; block.style.gridColumn = d.day + 1; block.style.gridRow = `${s} / span ${Math.max(5, e - s)}`;
            block.onclick = () => openEditModal(d.id);
            
            const dayLabel = ['','月','火','水','木','金','土'][d.day];
            const perLabel = getShortPeriodLabel(d.start, d.end, d.isSuper);

            block.innerHTML = `
                <div class="delete-btn" onclick="event.stopPropagation(); removeBlock('${d.id}')">&times;</div>
                <div class="time-tag-top">${d.start}</div>
                <div class="time-tag-bottom">${d.end}</div>
                <div class="mt-3 px-1">
                    <div class="mobile-period-tag">${dayLabel}${perLabel}</div>
                    <div class="font-black truncate text-[9px] md:text-[11px]">${d.title}</div>
                    <div class="text-[7px] font-bold text-gray-500 truncate">📍 ${d.location}</div>
                </div>
            `;
            grid.appendChild(block);
        }

        function removeBlock(id) {
            activeData = activeData.filter(x => x.id !== id);
            document.getElementById(id).remove();
            saveToStorage();
        }

        function openEditModal(id) {
            const d = activeData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-title').value = d.title;
            document.getElementById('edit-instructor').value = d.instructor;
            document.getElementById('edit-location').value = d.location;
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
            togglePeriodButtons('edit');
        }

        function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const d = activeData.find(x => x.id === id);
            d.title = document.getElementById('edit-title').value;
            d.instructor = document.getElementById('edit-instructor').value;
            d.location = document.getElementById('edit-location').value;
            const start = document.getElementById('edit-start').value;
            const end = document.getElementById('edit-end').value;
            if(start && end) { d.start = start; d.end = end; }
            document.getElementById(id).remove();
            renderBlock(d); saveToStorage(); closeModal('edit-modal');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        function togglePeriodButtons(prefix) {
            const container = document.getElementById(`${prefix}-period-container`);
            const isSuper = prefix === 'custom' ? document.getElementById('custom-is-super').checked : false;
            const data = isSuper ? SUPER_DATA : PERIOD_DATA;
            container.innerHTML = '';
            Object.entries(data).forEach(([k, [s, e]]) => {
                if(k === 'L') return;
                const btn = document.createElement('button');
                btn.className = 'bg-white border text-[10px] p-1 rounded font-black active:bg-blue-100';
                btn.innerText = k;
                btn.onclick = () => { 
                    document.getElementById(`${prefix}-start`).value = s; 
                    document.getElementById(`${prefix}-end`).value = e;
                    container.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
                    btn.classList.add('bg-blue-600', 'text-white');
                };
                container.appendChild(btn);
            });
        }

        function addCustomCourse() {
            const title = document.getElementById('custom-name').value;
            const start = document.getElementById('custom-start').value;
            const end = document.getElementById('custom-end').value;
            if(!title || !start) return;
            const d = { id: 'c-'+Date.now(), title, instructor: 'Custom', location: 'TBD', isSuper: document.getElementById('custom-is-super').checked, day: parseInt(document.getElementById('custom-day').value), start, end };
            activeData.push(d); renderBlock(d); saveToStorage();
        }

        function renderSyllabusList(filter = '') {
            const list = document.getElementById('syllabus-list');
            list.innerHTML = '';
            const filtered = masterSyllabus.filter(c => c.title.toLowerCase().includes(filter.toLowerCase()));
            filtered.forEach(c => {
                const el = document.createElement('div');
                el.className = 'p-2 bg-white border rounded-xl text-xs font-black shadow-sm active:bg-blue-50';
                el.innerText = c.title;
                el.onclick = () => {
                    c.periods.forEach(p => {
                        const d = { id: 's-'+Date.now()+Math.random(), title: c.title, instructor: c.instructor, location: c.location || 'TBD', isSuper: c.isSuper, day: p.day, start: p.start, end: p.end };
                        activeData.push(d); renderBlock(d);
                    });
                    saveToStorage();
                    if(window.innerWidth < 769) toggleSidebar();
                };
                list.appendChild(el);
            });
        }

        function initGrid() {
            const grid = document.getElementById('timetable-grid');
            grid.innerHTML = '';
            Object.entries(PERIOD_DATA).forEach(([key, [sT, eT]]) => {
                const s = timeToRow(sT), e = timeToRow(eT);
                const label = document.createElement('div');
                label.className = 'period-label';
                label.style.gridColumn = '1'; label.style.gridRow = `${s} / span ${e - s}`;
                label.innerHTML = `<span>${key}</span>`;
                grid.appendChild(label);
            });
            for (let i = 1; i <= 6; i++) {
                const col = document.createElement('div');
                col.className = 'border-r border-gray-100';
                col.style.gridColumn = i + 1; col.style.gridRow = '1 / span 145';
                grid.appendChild(col);
            }
        }

        function saveToStorage() { localStorage.setItem('icu_v2_data', JSON.stringify(activeData)); }
        function loadFromStorage() {
            const saved = localStorage.getItem('icu_v2_data');
            if(saved) { activeData = JSON.parse(saved); activeData.forEach(d => renderBlock(d)); }
        }

        function downloadImage() {
            html2canvas(document.getElementById('timetable-card'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'ICU_Schedule.png'; link.href = canvas.toDataURL(); link.click();
            });
        }

        window.onload = () => { initGrid(); loadFromStorage(); renderSyllabusList(); togglePeriodButtons('custom'); };
    </script>
</body>
</html>
